name: Build ImmortalWrt x86_64 1GB IPv6
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses-dev git flex gawk libssl-dev rsync wget unzip zstd

      - name: 克隆源码
        run: |
          git clone https://github.com/immortalwrt/immortalwrt.git --depth=1 openwrt

      - name: 添加常用插件源
        run: |
          cd openwrt
          echo "" >> feeds.conf.default
          echo "src-git small https://github.com/kiddin9/openwrt-packages.git" >> feeds.conf.default

      - name: 更新 feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 生成配置
        run: |
          cd openwrt
          cat > .config <<EOF
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_DEVICE_generic=y

          CONFIG_TARGET_ROOTFS_PARTSIZE=1024
          CONFIG_TARGET_ROOTFS_EXT4=y
          # CONFIG_TARGET_ROOTFS_SQUASHFS is not set

          # IPv6
          CONFIG_IPV6=y
          CONFIG_PACKAGE_dnsmasq-full=y
          CONFIG_PACKAGE_dnsmasq_full_ipv6=y
          CONFIG_PACKAGE_odhcp6c=y
          CONFIG_PACKAGE_odhcpd-ipv6only=y
          CONFIG_PACKAGE_luci-proto-ipv6=y
          CONFIG_PACKAGE_ipv6helper=y

          # 中文
          CONFIG_LUCI_LANG_zh_Hans=y

          # 基础
          CONFIG_PACKAGE_luci-app-opkg=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-app-filetransfer=y
          CONFIG_PACKAGE_luci-app-samba4=y
          CONFIG_PACKAGE_luci-app-wol=y

          # AdGuardHome
          CONFIG_PACKAGE_luci-app-adguardhome=y

          # MosDNS
          CONFIG_PACKAGE_luci-app-mosdns=y
          CONFIG_PACKAGE_mosdns=y

          # OpenClash
          CONFIG_PACKAGE_luci-app-openclash=y

          # rtp2httpd
          CONFIG_PACKAGE_luci-app-rtp2httpd=y
          CONFIG_PACKAGE_rtp2httpd=y

          # Watchcat
          CONFIG_PACKAGE_luci-app-watchcat=y

          # EasyTier
          CONFIG_PACKAGE_luci-app-easytier=y
          CONFIG_PACKAGE_easytier=y

          # ZeroTier
          CONFIG_PACKAGE_luci-app-zerotier=y
          CONFIG_PACKAGE_zerotier-one=y

          # 存储
          CONFIG_PACKAGE_kmod-usb-storage=y
          CONFIG_PACKAGE_kmod-fs-ext4=y
          CONFIG_PACKAGE_kmod-fs-ntfs3=y
          CONFIG_PACKAGE_block-mount=y
          EOF

          make defconfig

      - name: 下载依赖
        run: |
          cd openwrt
          make download -j$(nproc)

      - name: 单线程编译（防止报错）
        run: |
          cd openwrt
          make -j1 V=s

      - name: 整理固件
        run: |
          mkdir -p firmware
          cp openwrt/bin/targets/x86/64/* firmware/ 2>/dev/null || true

      - name: 上传到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: immortalwrt-x86_64-1gb-ipv6-$(date +%Y%m%d%H%M)
          name: ImmortalWrt x86_64 1GB IPv6
          body: "编译完成"
          files: firmware/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
